<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H254 Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0f;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:#141418;border:1px solid #2a2a35;border-top:3px solid #e8192c;border-radius:12px;padding:40px;width:360px;max-width:90vw;}
.login-logo{font-size:26px;font-weight:900;letter-spacing:3px;color:#fff;margin-bottom:4px;}
.login-logo span{color:#e8192c;}
.login-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-bottom:28px;}
.login-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:6px;display:block;}
.login-input{width:100%;background:#1c1c22;border:1px solid #2a2a35;color:#fff;font-size:13px;padding:10px 14px;border-radius:6px;outline:none;margin-bottom:14px;}
.login-input:focus{border-color:#e8192c;}
.login-btn{width:100%;background:#e8192c;border:none;color:#fff;font-size:13px;font-weight:700;letter-spacing:1px;padding:12px;border-radius:6px;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#c0111f;}
.login-error{color:#ff6b6b;font-size:12px;margin-top:10px;display:none;text-align:center;}

/* ADMIN PANEL */
#adminScreen{display:none;}
.topbar{background:#141418;border-bottom:1px solid #2a2a35;padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;}
.topbar-logo{font-size:18px;font-weight:900;letter-spacing:2px;color:#fff;flex:1;}
.topbar-logo span{color:#e8192c;}
.topbar-btn{background:none;border:1px solid #333;color:#aaa;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;}
.topbar-btn:hover{background:#1c1c22;color:#fff;}
.topbar-btn.green{background:#238636;border-color:#238636;color:#fff;}
.topbar-btn.green:hover{background:#1a6e2a;}
.topbar-btn.red{background:#e8192c;border-color:#e8192c;color:#fff;}

/* TOKEN BAR */
.token-bar{background:#0f1117;border-bottom:1px solid #1e2030;padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.token-bar label{font-size:11px;font-weight:700;color:#e8192c;letter-spacing:1px;white-space:nowrap;}
.token-input{flex:1;min-width:200px;background:#1c1c22;border:1px solid #333;color:#fff;padding:7px 12px;border-radius:6px;font-size:12px;font-family:monospace;outline:none;}
.token-input:focus{border-color:#e8192c;}
.token-status{font-size:11px;color:#666;white-space:nowrap;}
.token-link{font-size:11px;color:#58a6ff;text-decoration:none;white-space:nowrap;}

/* MAIN LAYOUT */
.main{display:flex;height:calc(100vh - 96px);}
.sidebar{width:280px;background:#141418;border-right:1px solid #2a2a35;overflow-y:auto;flex-shrink:0;}
.sidebar-header{padding:16px;border-bottom:1px solid #2a2a35;display:flex;align-items:center;gap:8px;}
.sidebar-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;flex:1;}
.new-btn{background:#e8192c;border:none;color:#fff;font-size:11px;font-weight:700;padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;}
.new-btn:hover{background:#c0111f;}
.sidebar-search{padding:10px 16px;border-bottom:1px solid #2a2a35;}
.search-input{width:100%;background:#1c1c22;border:1px solid #2a2a35;color:#fff;font-size:12px;padding:7px 10px;border-radius:6px;outline:none;}
.search-input:focus{border-color:#e8192c;}
.article-list{padding:8px;}
.article-item{padding:10px 12px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;}
.article-item:hover{background:#1c1c22;}
.article-item.active{background:#1c1c22;border-color:#e8192c;}
.article-item-title{font-size:12px;font-weight:600;color:#e0e0e0;line-height:1.4;margin-bottom:4px;}
.article-item-meta{font-size:10px;color:#555;display:flex;gap:8px;}
.article-item-cat{color:#e8192c;}
.article-item-del{float:right;background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:0 2px;}
.article-item-del:hover{color:#e8192c;}
.empty-list{padding:32px 16px;text-align:center;color:#444;font-size:13px;}

/* EDITOR */
.editor{flex:1;overflow-y:auto;padding:24px;}
.editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#333;text-align:center;}
.editor-empty-icon{font-size:48px;margin-bottom:16px;}
.editor-empty-text{font-size:14px;}
.editor-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #2a2a35;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#666;}
.form-input,.form-select,.form-textarea{background:#1c1c22;border:1px solid #2a2a35;color:#fff;font-size:13px;padding:10px 12px;border-radius:6px;outline:none;font-family:'Segoe UI',sans-serif;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#e8192c;}
.form-select option{background:#1c1c22;}
.form-textarea{resize:vertical;min-height:90px;}
.form-textarea.tall{min-height:180px;}
.form-actions{margin-top:20px;display:flex;gap:10px;}
.save-btn{background:#e8192c;border:none;color:#fff;font-size:13px;font-weight:700;padding:12px 28px;border-radius:6px;cursor:pointer;}
.save-btn:hover{background:#c0111f;}
.cancel-btn{background:none;border:1px solid #333;color:#888;font-size:13px;padding:12px 20px;border-radius:6px;cursor:pointer;}
.cancel-btn:hover{background:#1c1c22;color:#fff;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#238636;color:#fff;font-size:13px;font-weight:600;padding:12px 20px;border-radius:8px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.toast.error{background:#e8192c;}

@media(max-width:640px){
  .main{flex-direction:column;height:auto;}
  .sidebar{width:100%;height:auto;max-height:40vh;}
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:1;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><span>HUSTLE</span> 254</div>
    <div class="login-sub">Admin Panel</div>
    <label class="login-label">Username</label>
    <input class="login-input" id="loginUser" type="text" placeholder="Username" autocomplete="off" onkeyup="if(event.key==='Enter')doLogin()">
    <label class="login-label">Password</label>
    <input class="login-input" id="loginPass" type="password" placeholder="••••••••" onkeyup="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔐 Login</button>
    <div class="login-error" id="loginError">❌ Wrong username or password</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo"><span>HUSTLE</span> 254 &nbsp;<span style="color:#444;font-size:12px;font-weight:400;">ADMIN</span></div>
    <button class="topbar-btn green" onclick="publishToGitHub()">🚀 Publish Now</button>
    <button class="topbar-btn" onclick="doLogout()">Logout</button>
  </div>

  <!-- TOKEN BAR -->
  <div class="token-bar">
    <label>🔑 GITHUB TOKEN</label>
    <input class="token-input" id="tokenInput" type="password" placeholder="Paste token here (ghp_...) — required to publish">
    <span class="token-status" id="tokenStatus">not set</span>
    <a class="token-link" href="https://github.com/settings/tokens/new" target="_blank">Get token →</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Articles (<span id="articleCount">0</span>)</span>
        <button class="new-btn" onclick="newArticle()">＋ New</button>
      </div>
      <div class="sidebar-search">
        <input class="search-input" id="searchInput" placeholder="🔍 Search..." oninput="filterList()">
      </div>
      <div class="article-list" id="articleList"></div>
    </div>

    <!-- EDITOR -->
    <div class="editor" id="editor">
      <div class="editor-empty" id="editorEmpty">
        <div class="editor-empty-icon">✍️</div>
        <div class="editor-empty-text">Click <strong>＋ New</strong> to write an article<br>or select one from the list to edit</div>
      </div>
      <div id="editorForm" style="display:none;">
        <div class="editor-title" id="editorTitle">New Article</div>
        <input type="hidden" id="editId">
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Title *</label>
            <input class="form-input" id="editTitle" placeholder="Article headline...">
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="editCategory">
              <option>Kenya</option><option>World</option><option>Politics</option>
              <option>Business</option><option>Technology</option><option>Sports</option>
              <option>Health</option><option>Entertainment</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Region</label>
            <input class="form-input" id="editRegion" placeholder="e.g. Kenya, USA, Africa...">
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input class="form-input" id="editDate" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input class="form-input" id="editImg" placeholder="https://images.unsplash.com/...">
          </div>
          <div class="form-group full">
            <label class="form-label">Summary (shown on cards)</label>
            <textarea class="form-textarea" id="editSummary" placeholder="1-2 sentence summary..."></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">Full Article Body</label>
            <textarea class="form-textarea tall" id="editBody" placeholder="Full article... use blank lines between paragraphs."></textarea>
          </div>
          <div class="form-group full">
            <label class="form-label">Social Teaser (for Facebook/WhatsApp)</label>
            <textarea class="form-textarea" id="editTeaser" placeholder="🔥 Catchy teaser with emojis..."></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="save-btn" onclick="saveArticle()">💾 Save & Publish</button>
          <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const ADMIN_USER   = "Benedict";
const ADMIN_PASS   = "Benedict12#";
const GITHUB_OWNER = "hotnewss";
const GITHUB_REPO  = "hotnews";
const GITHUB_FILE  = "index.html";

// ── STATE ─────────────────────────────────────────────────────────────────────
let ARTICLES = [];
let editingId = null;
let githubToken = "";

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function doLogin(){
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value;
  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminScreen").style.display = "block";
    loadFromGitHub();
  } else {
    const err = document.getElementById("loginError");
    err.style.display = "block";
    setTimeout(()=> err.style.display="none", 2500);
  }
}

function doLogout(){
  document.getElementById("adminScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("loginUser").value = "";
  document.getElementById("loginPass").value = "";
  document.getElementById("tokenInput").value = "";
  githubToken = "";
  ARTICLES = [];
}

// ── TOKEN ─────────────────────────────────────────────────────────────────────
document.getElementById("tokenInput").addEventListener("input", function(){
  githubToken = this.value.trim();
  const status = document.getElementById("tokenStatus");
  if(githubToken){
    status.textContent = "✅ token set";
    status.style.color = "#3fb950";
  } else {
    status.textContent = "not set";
    status.style.color = "#666";
  }
});

// ── LOAD ARTICLES FROM GITHUB ─────────────────────────────────────────────────
async function loadFromGitHub(){
  showToast("⏳ Loading articles from GitHub...");
  try {
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    const headers = {"Accept":"application/vnd.github.v3+json"};
    if(githubToken) headers["Authorization"] = "token "+githubToken;
    const res = await fetch(url, {headers});
    if(!res.ok) throw new Error("Cannot load from GitHub: "+res.status);
    const data = await res.json();
    const html = decodeURIComponent(escape(atob(data.content.replace(/\n/g,""))));
    // Extract ARTICLES array
    const marker = "const ARTICLES = [";
    const s = html.indexOf(marker);
    let depth=0, e=-1;
    for(let i=s+marker.length-1;i<html.length;i++){
      if(html[i]==="[") depth++;
      else if(html[i]==="]"){ depth--; if(depth===0){e=i+1;break;} }
    }
    if(s===-1||e===-1){ ARTICLES=[]; }
    else {
      try { ARTICLES = eval(html.slice(s+marker.length-1, e)); }
      catch(err){ ARTICLES=[]; }
    }
    renderList();
    showToast("✅ Loaded "+ARTICLES.length+" articles");
  } catch(err){
    showToast("⚠️ Could not load articles: "+err.message, true);
    ARTICLES = [];
    renderList();
  }
}

// ── ARTICLE LIST ──────────────────────────────────────────────────────────────
function renderList(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = ARTICLES.filter(a =>
    a.title.toLowerCase().includes(q) || (a.category||"").toLowerCase().includes(q)
  );
  document.getElementById("articleCount").textContent = ARTICLES.length;
  const list = document.getElementById("articleList");
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-list">No articles yet.<br>Click ＋ New to add one.</div>';
    return;
  }
  list.innerHTML = filtered.map(a => `
    <div class="article-item ${editingId===a.id?'active':''}" onclick="editArticle(${a.id})">
      <button class="article-item-del" onclick="event.stopPropagation();deleteArticle(${a.id})">🗑</button>
      <div class="article-item-title">${a.title}</div>
      <div class="article-item-meta">
        <span class="article-item-cat">${a.category||""}</span>
        <span>${a.date||""}</span>
      </div>
    </div>
  `).join("");
}

function filterList(){ renderList(); }

// ── NEW ARTICLE ───────────────────────────────────────────────────────────────
function newArticle(){
  editingId = null;
  const newId = ARTICLES.length > 0 ? Math.max(...ARTICLES.map(a=>a.id))+1 : 1;
  document.getElementById("editId").value = newId;
  document.getElementById("editTitle").value = "";
  document.getElementById("editCategory").value = "Kenya";
  document.getElementById("editRegion").value = "Kenya";
  document.getElementById("editDate").value = new Date().toISOString().split("T")[0];
  document.getElementById("editImg").value = "";
  document.getElementById("editSummary").value = "";
  document.getElementById("editBody").value = "";
  document.getElementById("editTeaser").value = "";
  document.getElementById("editorTitle").textContent = "✍️ New Article";
  document.getElementById("editorEmpty").style.display = "none";
  document.getElementById("editorForm").style.display = "block";
}

// ── EDIT ARTICLE ──────────────────────────────────────────────────────────────
function editArticle(id){
  const a = ARTICLES.find(x=>x.id===id);
  if(!a) return;
  editingId = id;
  document.getElementById("editId").value = a.id;
  document.getElementById("editTitle").value = a.title||"";
  document.getElementById("editCategory").value = a.category||"Kenya";
  document.getElementById("editRegion").value = a.region||"";
  document.getElementById("editDate").value = a.date||"";
  document.getElementById("editImg").value = a.img||"";
  document.getElementById("editSummary").value = a.summary||"";
  document.getElementById("editBody").value = a.body||"";
  document.getElementById("editTeaser").value = a.teaser||"";
  document.getElementById("editorTitle").textContent = "✏️ Edit Article";
  document.getElementById("editorEmpty").style.display = "none";
  document.getElementById("editorForm").style.display = "block";
  renderList();
}

// ── SAVE ARTICLE ──────────────────────────────────────────────────────────────
function saveArticle(){
  const title = document.getElementById("editTitle").value.trim();
  if(!title){ alert("Title is required."); return; }
  const article = {
    id:       editingId || parseInt(document.getElementById("editId").value),
    title,
    category: document.getElementById("editCategory").value,
    region:   document.getElementById("editRegion").value.trim(),
    date:     document.getElementById("editDate").value.trim(),
    img:      document.getElementById("editImg").value.trim(),
    summary:  document.getElementById("editSummary").value.trim(),
    body:     document.getElementById("editBody").value.trim(),
    teaser:   document.getElementById("editTeaser").value.trim()
  };
  if(editingId){
    const idx = ARTICLES.findIndex(x=>x.id===editingId);
    if(idx!==-1) ARTICLES[idx] = article;
  } else {
    ARTICLES.unshift(article); // new articles always on top
  }
  cancelEdit();
  renderList();
  publishToGitHub();
}

// ── DELETE ARTICLE ────────────────────────────────────────────────────────────
function deleteArticle(id){
  if(!confirm("Delete this article? Cannot be undone.")) return;
  ARTICLES = ARTICLES.filter(a=>a.id!==id);
  if(editingId===id) cancelEdit();
  renderList();
  publishToGitHub();
}

function cancelEdit(){
  editingId = null;
  document.getElementById("editorForm").style.display = "none";
  document.getElementById("editorEmpty").style.display = "flex";
  renderList();
}

// ── SERIALIZE & BUILD HTML ────────────────────────────────────────────────────
function serializeArticles(){
  return ARTICLES.map(a => {
    const esc = s => (s||"").replace(/\\/g,"\\\\").replace(/`/g,"\\`").replace(/\${/g,"\\${");
    return "  {id:"+a.id+",title:"+JSON.stringify(a.title)+
      ",category:"+JSON.stringify(a.category)+
      ",region:"+JSON.stringify(a.region)+
      ",img:"+JSON.stringify(a.img||"")+
      ",summary:"+JSON.stringify(a.summary||"")+
      ",body:`"+esc(a.body||"")+"`"+
      ",date:"+JSON.stringify(a.date||"")+
      ",teaser:"+JSON.stringify(a.teaser||"")+"}";
  }).join(",\n");
}

// ── PUBLISH TO GITHUB ─────────────────────────────────────────────────────────
async function publishToGitHub(){
  const token = document.getElementById("tokenInput").value.trim();
  if(!token){
    showToast("⚠️ Paste your GitHub token first!", true);
    document.getElementById("tokenInput").focus();
    return;
  }
  showToast("⏳ Publishing to GitHub...");
  const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
  const headers = {
    "Authorization": "token "+token,
    "Accept": "application/vnd.github.v3+json",
    "Content-Type": "application/json"
  };
  try {
    // 1. Get current file + SHA
    const r1 = await fetch(apiUrl, {headers});
    if(!r1.ok) throw new Error("Cannot read index.html from GitHub ("+r1.status+")");
    const fileData = await r1.json();
    const sha = fileData.sha;
    const currentHTML = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g,""))));

    // 2. Replace ARTICLES array in the live index.html
    const marker = "const ARTICLES = [";
    const s = currentHTML.indexOf(marker);
    let depth=0, e=-1;
    for(let i=s+marker.length-1;i<currentHTML.length;i++){
      if(currentHTML[i]==="[") depth++;
      else if(currentHTML[i]==="]"){ depth--; if(depth===0){e=i+1;break;} }
    }
    if(s===-1||e===-1) throw new Error("Could not find ARTICLES in index.html");
    const newHTML = currentHTML.slice(0,s)+"const ARTICLES = [\n"+serializeArticles()+"\n]"+currentHTML.slice(e);

    // 3. Push to GitHub
    const encoded = btoa(unescape(encodeURIComponent(newHTML)));
    const r2 = await fetch(apiUrl, {
      method:"PUT", headers,
      body: JSON.stringify({
        message: "Publish "+new Date().toISOString().slice(0,16).replace("T"," "),
        content: encoded,
        sha
      })
    });
    if(!r2.ok){ const err=await r2.json(); throw new Error(err.message||r2.status); }
    showToast("🚀 Published! Live on hustle254.com in ~30 seconds.");
  } catch(err){
    showToast("❌ "+err.message, true);
    console.error(err);
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, isError=false){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError?" error":"");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.className="toast", 4000);
}
</script>
</body>
</html>
